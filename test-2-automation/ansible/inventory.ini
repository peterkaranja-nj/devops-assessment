# inventory.ini — Ansible inventory for the provisioned VMs.
#
# After running `terraform apply`, populate the IP addresses using:
#   terraform output gateway_public_ip
#   terraform output app_private_ip
#
# The app VM is accessed via SSH ProxyJump through the gateway.

[gateway]
vm-gateway ansible_host=GATEWAY_PUBLIC_IP ansible_user=azureuser ansible_ssh_private_key_file=~/.ssh/id_rsa

[app]
vm-app ansible_host=APP_PRIVATE_IP ansible_user=azureuser ansible_ssh_private_key_file=~/.ssh/id_rsa
# ProxyJump: reach the private VM through the gateway
# ansible_ssh_common_args='-o ProxyJump="azureuser@GATEWAY_PUBLIC_IP"'

[all:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
